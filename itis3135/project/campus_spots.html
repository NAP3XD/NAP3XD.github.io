<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Spots - UNCC Skateboarding</title>
  <link rel="stylesheet" href="css/styles.css">

</head>
<body>

  <div data-include="components/header.html"></div>

  <main>
    <h2>Explore Skate Spots on Campus</h2>
    <div>
      <button class="spot">Spot 1</button>
      <button class="spot">Spot 2</button>
      <button class="spot">Spot 3</button>
    </div>
    <div>
      <img src="./images/dill.png" class="spot-img active" alt="Spot 1">
      <img src="images/spot2.jpg" class="spot-img" alt="Spot 2">
      <img src="images/spot3.jpg" class="spot-img" alt="Spot 3">
    </div>
  </main>

   <div data-include="components/footer.html"></div>
	<script src="scripts/HTMLInclude.min.js"></script>
  <script>
    const pageData = {
      newTitle: "UNCC Campus Skate Spots"
    };

    // JavaScript for dynamic campus spots section
document.addEventListener('DOMContentLoaded', () => {
    const spots = document.querySelectorAll('.spot');
    const images = document.querySelectorAll('.spot-img');
  
    spots.forEach((spot, index) => {
      spot.addEventListener('click', () => {
        images.forEach(img => img.classList.remove('active'));
        images[index].classList.add('active');
      });
    });
  });
  
  </script>
 
</body>
</html>

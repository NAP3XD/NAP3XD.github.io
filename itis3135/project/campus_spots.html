<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Spots - UNCC Skateboarding</title>
  <link rel="stylesheet" href="css/styles.css">

</head>
<body>

  <div data-include="components/header.html"></div>

  <main>
    <h2>Explore Skate Spots on Campus</h2>
    <div>
      <button class="spot">Stair Sets</button>
      <button class="spot">Ledges</button>
      <button class="spot">Flat Ground</button>
    </div>
    <div class="spot-container">
      <!-- Placeholder images for Stair Sets -->
      <img src="images/eastdeck_twohalf.jpg" class="spot-img" alt="The Start">
      <img src="images/fretwell_four.jpg" class="spot-img" alt="Training Ground">
      <img src="images/sas_nine.jpg" class="spot-img" alt="Big Person Set">
      
      <!-- Placeholder images for Ledges -->
      <img src="images/eastdeck_lilledge.jpg" class="spot-img" alt="The Start">
      <img src="images/starquad_stepupledge.jpg" class="spot-img" alt="Training Ground">
      <img src="images/lowersas_midledge.jpg" class="spot-img" alt="Sold ledge">

      <!-- Placeholder images for Flat Ground -->
      <img src="images/pav_thedojo.jpg" class="spot-img" alt="Rainy Day Stop">
      <img src="images/backsas_butterlot.jpg" class="spot-img" alt="Good when frats take over Star Quad">
      <!-- add class="spot-img active" to display a default" -->
      <img src="images/starquad_themecca.jpg" class="spot-img active" alt="The Holy Land">
    </div>
  </main>

  <div data-include="components/footer.html"></div>
  <script src="scripts/HTMLInclude.min.js"></script>

  <script>
    // Object with a property for the dynamic header note
    const pageData = {
      newTitle: "UNCC Campus Skate Spots"
    };

    // JavaScript for dynamic campus spots section
    document.addEventListener('DOMContentLoaded', () => {
      const spots = document.querySelectorAll('.spot');
      const images = document.querySelectorAll('.spot-img');
      
      spots.forEach((spot, spotIndex) => {
        spot.addEventListener('click', () => {
          images.forEach((img, imgIndex) => {
            img.classList.remove('active');
            // Show only the images that belong to the clicked spot
            if (Math.floor(imgIndex / 3) === spotIndex) {
              img.classList.add('active');
            }
          });
        });
      });
    });
  </script>


 
</body>
</html>

  <script>
// Initialize the slide index to 1
let slideIndex = 1;

// Function to show the slide at position 'n'
function showSlides(n) {
  let i;
  // Get all elements with class name "myslides"
  let slides = document.getElementsByClassName("myslides");
  // If 'n' exceeds the number of slides, reset to the first slide
  if (n > slides.length) {
    slideIndex = 1;
  }
  // If 'n' is less than 1, set to the last slide
  if (n < 1) {
    slideIndex = slides.length;
  }
  // Loop through all slides and hide them
  for (i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";  
  }
  // Display the current slide
  slides[slideIndex - 1].style.display = "block";  
}

// Function to increment or decrement the slide index
function plusSlides(n) {
  // Update the slide index and show the new slide
  showSlides(slideIndex += n);
}

// Show the first slide initially
showSlides(slideIndex);

  </script>

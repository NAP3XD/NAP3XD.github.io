<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Competition - UNCC Skateboarding</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div data-include="components/header.html"></div>

  <main>
    <section>
      <h2>Competition Sign-Up</h2>
      <form>
        <!-- Skater Name -->
        <label for="name">Skater Name:</label>
        <input type="text" id="name" name="name" required>
        
        <!-- Years Skating Dropdown -->
        <label for="years-skating">Years Skating:</label>
        <select id="years-skating" name="years-skating" required>
          <option value="" disabled selected>Select</option>
          <option value="less-than-1">Less than 1</option>
          <option value="1-3">1-3</option>
          <option value="5-plus">5+</option>
        </select>
        
        <!-- Can Kickflip Radio Buttons -->
        <fieldset>
          <legend>Can Kickflip?</legend>
          <label>
            <input type="radio" name="can-kickflip" value="yes" required>
            Yes
          </label>
          <label>
            <input type="radio" name="can-kickflip" value="no" required>
            No
          </label>
        </fieldset>
        
        <!-- Submit Button -->
        <button type="submit">Sign Up</button>
      </form>
    </section>
  
    <section>
      <h2>Bracket</h2>
      <p>Display the competition bracket here.</p>
    </section>
  </main>

  <div data-include="components/footer.html"></div>
	<script src="scripts/HTMLInclude.min.js"></script>

  <script>
    //  object with a property for the dynamic header note
    const pageData = {
      newTitle: "UNCC Sk8 Tournament Signup"
    };
  </script>
</body>
</html>
